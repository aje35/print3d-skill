metadata:
  type: lookup_table
  topic: Text Engraving Guidelines for FDM
  modes: [modify]
  materials: [PLA, PETG, ABS]
  printers: []
  version: "1.0"

data:
  description: "Font size, depth, and style recommendations for legible FDM text"
  minimum_font_size_by_nozzle:
    - nozzle_mm: 0.4
      min_font_size_mm: 3.0
      notes: "Below 3mm, individual strokes are thinner than nozzle diameter"
    - nozzle_mm: 0.6
      min_font_size_mm: 4.0
      notes: "Slightly larger minimum due to wider extrusion paths"
    - nozzle_mm: 0.8
      min_font_size_mm: 5.0
      notes: "Coarser resolution requires larger text for legibility"

  recommended_depth_by_layer_height:
    - layer_height_mm: 0.1
      min_depth_mm: 0.3
      recommended_depth_mm: 0.5
      notes: "3 layers minimum for visible engraving"
    - layer_height_mm: 0.2
      min_depth_mm: 0.6
      recommended_depth_mm: 0.8
      notes: "3-4 layers for crisp edges"
    - layer_height_mm: 0.3
      min_depth_mm: 0.9
      recommended_depth_mm: 1.2
      notes: "Larger layers need deeper engraving"

  font_recommendations:
    best_choices:
      - font: "Liberation Sans"
        style: "Bold"
        reason: "Clean sans-serif with consistent stroke width"
      - font: "Arial"
        style: "Bold"
        reason: "Wide strokes print clearly on FDM"
      - font: "Helvetica"
        style: "Bold"
        reason: "Similar to Arial, good FDM legibility"
    avoid:
      - font_type: "Serif fonts (Times, Georgia)"
        reason: "Thin serifs below nozzle diameter create artifacts"
      - font_type: "Script/cursive fonts"
        reason: "Connected thin strokes are unreliable at small sizes"
      - font_type: "Thin/Light weight variants"
        reason: "Stroke width falls below printable minimum"

  surface_considerations:
    flat_surfaces:
      quality: "Best"
      notes: "Text prints cleanly on flat horizontal surfaces (top/bottom)"
    vertical_surfaces:
      quality: "Good"
      notes: "Engraving on vertical faces works but may show layer lines"
    curved_surfaces:
      quality: "Fair"
      notes: "Text projection on cylinders/spheres may distort at edges"
      recommendation: "Use larger font sizes on curved surfaces (1.5x minimum)"
