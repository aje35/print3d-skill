metadata:
  type: printer_capabilities
  topic: printer_profiles
  modes: [validate]
  materials: []
  printers: []
  version: "1.0"

data:
  description: "Common 3D printer capability profiles for validation"
  profiles:
    generic_direct_drive_enclosed:
      description: "Enclosed direct drive printer (Bambu X1C class)"
      build_volume_x_mm: 256
      build_volume_y_mm: 256
      build_volume_z_mm: 256
      max_hotend_temp_c: 300
      max_bed_temp_c: 120
      extruder_type: direct_drive
      has_heated_bed: true
      has_enclosure: true
      notes:
        - "Can print all common materials including ABS and ASA"
        - "High-speed capable with input shaping"

    generic_direct_drive_open:
      description: "Open-frame direct drive printer (Prusa MK3S class)"
      build_volume_x_mm: 250
      build_volume_y_mm: 210
      build_volume_z_mm: 210
      max_hotend_temp_c: 280
      max_bed_temp_c: 100
      extruder_type: direct_drive
      has_heated_bed: true
      has_enclosure: false
      notes:
        - "Best for PLA, PETG, and TPU"
        - "ABS/ASA require aftermarket enclosure"

    generic_bowden:
      description: "Open-frame bowden printer (Ender 3 class)"
      build_volume_x_mm: 220
      build_volume_y_mm: 220
      build_volume_z_mm: 250
      max_hotend_temp_c: 260
      max_bed_temp_c: 110
      extruder_type: bowden
      has_heated_bed: true
      has_enclosure: false
      notes:
        - "Longer retraction distances needed (4-7mm)"
        - "Flexible filaments very difficult"
        - "Best for PLA and PETG"
