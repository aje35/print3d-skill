metadata:
  type: material_properties
  topic: petg_print_settings
  modes: [validate]
  materials: [PETG]
  printers: []
  version: "1.0"

data:
  description: "PETG printing temperature, speed, and retraction settings for FDM validation"
  material: PETG
  properties:
    hotend_temp_min_c: 220
    hotend_temp_max_c: 250
    hotend_temp_recommended_c: 235
    bed_temp_min_c: 70
    bed_temp_max_c: 90
    bed_temp_recommended_c: 80
    print_speed_min_mm_s: 25
    print_speed_max_mm_s: 60
    retraction_direct_drive_mm: 0.5-1.5
    retraction_bowden_mm: 3-6
    retraction_speed_mm_s: 40
    requires_enclosure: false
    requires_heated_bed: true
    fan_speed_percent: 50
    notes:
      - "Strings easily - minimize retraction travel"
      - "Avoid over-cooling"
