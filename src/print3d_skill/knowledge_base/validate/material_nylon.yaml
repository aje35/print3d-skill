metadata:
  type: material_properties
  topic: nylon_print_settings
  modes: [validate]
  materials: [nylon]
  printers: []
  version: "1.0"

data:
  description: "Nylon printing temperature, speed, and retraction settings for FDM validation"
  material: nylon
  properties:
    hotend_temp_min_c: 240
    hotend_temp_max_c: 270
    hotend_temp_recommended_c: 255
    bed_temp_min_c: 70
    bed_temp_max_c: 90
    bed_temp_recommended_c: 80
    print_speed_min_mm_s: 25
    print_speed_max_mm_s: 50
    retraction_direct_drive_mm: 0.5-1.5
    retraction_bowden_mm: 3-6
    retraction_speed_mm_s: 40
    requires_enclosure: false
    requires_heated_bed: true
    fan_speed_percent: 0-30
    notes:
      - "Highly hygroscopic - dry before printing"
      - "Enclosure recommended for warping"
      - "Store in sealed container with desiccant"
