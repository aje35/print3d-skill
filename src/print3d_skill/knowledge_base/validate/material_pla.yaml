metadata:
  type: material_properties
  topic: pla_print_settings
  modes: [validate]
  materials: [PLA]
  printers: []
  version: "1.0"

data:
  description: "PLA printing temperature, speed, and retraction settings for FDM validation"
  material: PLA
  properties:
    hotend_temp_min_c: 190
    hotend_temp_max_c: 220
    hotend_temp_recommended_c: 205
    bed_temp_min_c: 50
    bed_temp_max_c: 70
    bed_temp_recommended_c: 60
    print_speed_min_mm_s: 30
    print_speed_max_mm_s: 80
    retraction_direct_drive_mm: 0.5-2.0
    retraction_bowden_mm: 4-7
    retraction_speed_mm_s: 45
    requires_enclosure: false
    requires_heated_bed: false
    fan_speed_percent: 100
    notes:
      - "Most forgiving material"
      - "Prone to heat creep above 230C"
