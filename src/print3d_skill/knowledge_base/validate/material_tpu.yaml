metadata:
  type: material_properties
  topic: tpu_print_settings
  modes: [validate]
  materials: [TPU]
  printers: []
  version: "1.0"

data:
  description: "TPU flexible filament printing temperature, speed, and retraction settings for FDM validation"
  material: TPU
  properties:
    hotend_temp_min_c: 220
    hotend_temp_max_c: 250
    hotend_temp_recommended_c: 230
    bed_temp_min_c: 40
    bed_temp_max_c: 60
    bed_temp_recommended_c: 50
    print_speed_min_mm_s: 15
    print_speed_max_mm_s: 40
    retraction_direct_drive_mm: 0.5-1.0
    retraction_bowden_mm: 1.5-3.0
    retraction_speed_mm_s: 25
    requires_enclosure: false
    requires_heated_bed: false
    fan_speed_percent: 50-100
    notes:
      - "Very difficult on bowden extruders"
      - "Reduce speed significantly"
      - "Direct drive strongly recommended"
