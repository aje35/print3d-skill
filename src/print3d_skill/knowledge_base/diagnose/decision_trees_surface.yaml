metadata:
  type: decision_tree
  topic: surface_defect_diagnosis
  modes: [diagnose]
  version: "1.0"

data:
  description: "Decision trees for diagnosing surface quality defects including zits/blobs, ghosting/ringing, and support scarring"
  trees:
    zits_blobs:
      name: "Zits and Blobs"
      description: "Small bumps or pimples on the outer surface of the print at layer start/end points or retraction positions, caused by pressure fluctuations in the nozzle"
      root:
        condition: "material_type"
        branches:
          PLA:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "PLA zits from pressure buildup at seam point and retraction position"
                    likelihood: "high"
                    contributing_factors: ["seam placement", "retraction prime amount", "coasting not enabled"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Random seam placing zits on visible surfaces"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Aligning the seam to the sharpest corner hides the inevitable blob at the layer start/end point"
                      - setting: "retraction_extra_prime"
                        current_issue: "Extra prime amount too high causing blob after retraction"
                        suggested_value: "0mm3"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Extra prime adds material after retraction; for direct drive PLA this should be zero as there is minimal pressure loss"
                      - setting: "coasting_distance"
                        current_issue: "Coasting not enabled"
                        suggested_value: "0.2mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Coasting stops extrusion slightly before the end of a path, using residual pressure to fill the last segment and reducing blob at the seam"
                      - setting: "wipe_distance"
                        current_issue: "No wipe at end of perimeter"
                        suggested_value: "1.0mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Wiping retraces the nozzle along the perimeter at the end, smearing residual material instead of depositing it as a blob"
                      - setting: "linear_advance"
                        current_issue: "Linear advance not calibrated"
                        suggested_value: "K0.04"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Linear advance compensates for pressure changes during speed transitions, reducing blobs at corners and seams"
              bowden:
                causes:
                  - description: "PLA zits from bowden tube pressure hysteresis"
                    likelihood: "high"
                    contributing_factors: ["bowden tube pressure delay", "retraction/prime mismatch", "coasting not configured"]
                    recommendations:
                      - setting: "retraction_extra_prime"
                        current_issue: "Extra prime too high or too low"
                        suggested_value: "0.05mm3"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bowden systems lose some pressure during retraction; a small extra prime compensates without creating blobs"
                      - setting: "coasting_distance"
                        current_issue: "Not enabled"
                        suggested_value: "0.3mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bowden systems have more residual pressure; coasting relieves this before the seam point"
                      - setting: "seam_position"
                        current_issue: "Random seam spreading zits across surface"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Concentrating seams at one position makes them less noticeable than random distribution"
                      - setting: "wipe_distance"
                        current_issue: "No wipe configured"
                        suggested_value: "1.5mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Longer wipe distance for bowden compensates for the higher residual pressure in the system"
              _default:
                causes:
                  - description: "PLA zits from pressure management issues"
                    likelihood: "high"
                    contributing_factors: ["seam placement", "pressure hysteresis"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Not optimized"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Seam alignment is the single most impactful setting for reducing visible zits"
                      - setting: "coasting_distance"
                        current_issue: "Not enabled"
                        suggested_value: "0.2mm (direct drive) or 0.3mm (bowden)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Coasting relieves nozzle pressure before the seam, reducing blob size"
          PETG:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "PETG zits from low viscosity and pressure fluctuations"
                    likelihood: "high"
                    contributing_factors: ["PETG oozes easily", "pressure buildup at seam", "retraction settings"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Random seam distributing blobs across surface"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG blobs are larger than PLA; concentrating them at one seam position is essential"
                      - setting: "retraction_extra_prime"
                        current_issue: "Extra prime depositing excess PETG"
                        suggested_value: "0mm3"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG has low viscosity and does not lose pressure during retraction on direct drive; no extra prime needed"
                      - setting: "wipe_distance"
                        current_issue: "No wipe configured"
                        suggested_value: "2.0mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG needs a longer wipe due to its stringy nature; the wipe cleans the nozzle before travel"
                      - setting: "nozzle_temperature"
                        current_issue: "Too high causing excessive ooze"
                        suggested_value: "230C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower PETG temperature increases viscosity, reducing the tendency to form blobs"
                      - setting: "coasting_distance"
                        current_issue: "Not enabled"
                        suggested_value: "0.3mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG retains more pressure; coasting helps release it before the seam"
              bowden:
                causes:
                  - description: "PETG zits amplified by bowden pressure hysteresis"
                    likelihood: "high"
                    contributing_factors: ["bowden pressure delay", "PETG low viscosity", "retraction inconsistency"]
                    recommendations:
                      - setting: "coasting_distance"
                        current_issue: "Not configured for bowden PETG"
                        suggested_value: "0.4mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Longer coasting distance for bowden PETG releases the substantial residual pressure before the seam"
                      - setting: "wipe_distance"
                        current_issue: "No wipe"
                        suggested_value: "2.5mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG on bowden needs extensive wiping to clean the nozzle of ooze before travel"
                      - setting: "seam_position"
                        current_issue: "Random seam"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Seam alignment concentrates the inevitable PETG blobs at a single, less visible location"
              _default:
                causes:
                  - description: "PETG zits from inherent low viscosity and pressure issues"
                    likelihood: "high"
                    contributing_factors: ["material properties", "pressure management"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Not aligned"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG zits are larger than other materials; seam alignment is critical"
                      - setting: "wipe_distance"
                        current_issue: "Not configured"
                        suggested_value: "2.0mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Wipe is essential for PETG to manage its stringy, oozy nature at seam points"
          ABS:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "ABS zits from seam and pressure at high temperatures"
                    likelihood: "medium"
                    contributing_factors: ["high print temperature", "seam placement", "pressure fluctuations"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Random seam"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Seam alignment hides the layer start/end blob at the least visible position"
                      - setting: "coasting_distance"
                        current_issue: "Not enabled"
                        suggested_value: "0.2mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Coasting releases residual pressure before the seam point"
                      - setting: "linear_advance"
                        current_issue: "Not calibrated for ABS"
                        suggested_value: "K0.04"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Linear advance smooths pressure changes for ABS, reducing corner and seam artifacts"
                      - setting: "wipe_distance"
                        current_issue: "No wipe"
                        suggested_value: "1.0mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Wipe cleans the nozzle at the end of perimeters to reduce blobs"
              _default:
                causes:
                  - description: "ABS zits from seam and pressure management"
                    likelihood: "medium"
                    contributing_factors: ["seam placement", "pressure"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Not optimized"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Seam alignment is effective for ABS zit management"
          TPU:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "TPU zits from pressure stored in flexible filament"
                    likelihood: "high"
                    contributing_factors: ["filament compression storing pressure", "slow release of stored energy"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Random seam"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "TPU pressure fluctuations create larger blobs; concentrating them at the seam is essential"
                      - setting: "print_speed"
                        current_issue: "Speed changes causing pressure spikes in flexible filament"
                        suggested_value: "25mm/s constant"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Constant speed prevents the pressure spikes that cause blobs with flexible filament"
                      - setting: "coasting_distance"
                        current_issue: "Not configured for TPU"
                        suggested_value: "0.4mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Longer coasting for TPU releases the pressure stored in the compressed filament before the seam"
              _default:
                causes:
                  - description: "TPU zits from inherent pressure storage in flexible filament"
                    likelihood: "high"
                    contributing_factors: ["filament compression", "pressure release at seam"]
                    recommendations:
                      - setting: "print_speed"
                        current_issue: "Speed variations causing pressure fluctuations"
                        suggested_value: "25mm/s constant"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Constant, slow speed minimizes pressure changes in flexible filament"
          ASA:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "ASA zits from seam and high-temperature pressure"
                    likelihood: "medium"
                    contributing_factors: ["high print temperature", "seam placement"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Random seam"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Seam alignment is effective for managing ASA blobs"
                      - setting: "coasting_distance"
                        current_issue: "Not enabled"
                        suggested_value: "0.2mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Coasting reduces pressure at the seam point for ASA"
                      - setting: "wipe_distance"
                        current_issue: "No wipe"
                        suggested_value: "1.0mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Wipe cleans the nozzle before travel to prevent blob deposits"
              _default:
                causes:
                  - description: "ASA zits from pressure and seam issues"
                    likelihood: "medium"
                    contributing_factors: ["seam placement", "pressure fluctuations"]
                    recommendations:
                      - setting: "seam_position"
                        current_issue: "Not optimized"
                        suggested_value: "Aligned (sharpest corner)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Seam alignment is the primary zit mitigation for ASA"
          _default:
            causes:
              - description: "Zits and blobs from seam placement and pressure management"
                likelihood: "high"
                contributing_factors: ["random seam position", "no coasting or wipe", "retraction settings"]
                recommendations:
                  - setting: "seam_position"
                    current_issue: "Random or nearest seam spreading blobs across surfaces"
                    suggested_value: "Aligned (sharpest corner)"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Seam alignment is the single most effective setting for reducing visible zits on prints"
                  - setting: "coasting_distance"
                    current_issue: "Not enabled"
                    suggested_value: "0.2-0.4mm depending on extruder type"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Coasting stops extrusion early and uses residual pressure to fill the last segment"
                  - setting: "wipe_distance"
                    current_issue: "Not configured"
                    suggested_value: "1.0-2.0mm"
                    impact: "medium"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Wiping smears residual material along the perimeter instead of depositing it as a blob"

    ghosting:
      name: "Ghosting / Ringing"
      description: "Ripple or echo patterns on flat surfaces near sharp corners or features, caused by vibrations in the printer frame or motion system that propagate after sudden direction changes"
      root:
        condition: "material_type"
        branches:
          PLA:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "Ghosting from print head mass and speed on direct drive"
                    likelihood: "high"
                    contributing_factors: ["heavy direct drive extruder", "high acceleration", "frame resonance"]
                    recommendations:
                      - setting: "acceleration"
                        current_issue: "Too high causing vibrations at direction changes"
                        suggested_value: "1000mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower acceleration reduces the impulse force at corners that excites frame vibrations and creates ringing patterns"
                      - setting: "jerk"
                        current_issue: "Too high causing instantaneous speed changes"
                        suggested_value: "8mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Jerk controls the instantaneous speed change at corners; lower values smooth direction changes and reduce vibrations"
                      - setting: "print_speed"
                        current_issue: "Too fast amplifying vibrations"
                        suggested_value: "50mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower speed reduces the kinetic energy that converts to vibrations at corners"
                      - setting: "input_shaper"
                        current_issue: "Not enabled or not tuned"
                        suggested_value: "Enable with resonance test (Klipper: MZV or EI type)"
                        impact: "high"
                        difficulty: "hard"
                        category: "controllable"
                        explanation: "Input shaping filters out the printer's resonant frequencies, eliminating ghosting at the firmware level"
              bowden:
                causes:
                  - description: "Ghosting from speed and frame vibrations (lighter head reduces severity)"
                    likelihood: "medium"
                    contributing_factors: ["high speed", "frame flex", "bowden tube whip"]
                    recommendations:
                      - setting: "acceleration"
                        current_issue: "Too high for the frame rigidity"
                        suggested_value: "800mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bowden printers typically have lighter heads but less rigid frames; reduce acceleration to minimize vibration"
                      - setting: "jerk"
                        current_issue: "Too high"
                        suggested_value: "8mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower jerk reduces the sharp direction changes that excite frame resonance"
                      - setting: "frame_rigidity"
                        current_issue: "Frame may be loose or on an unstable surface"
                        suggested_value: "Tighten all frame bolts; place printer on stable, heavy surface"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "A loose frame amplifies vibrations; tightening bolts and stabilizing the base reduces ringing"
                      - setting: "print_speed"
                        current_issue: "Too fast for the frame"
                        suggested_value: "50mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reducing speed lowers the energy available to excite vibrations"
              _default:
                causes:
                  - description: "Ghosting from acceleration, speed, and frame vibrations"
                    likelihood: "high"
                    contributing_factors: ["acceleration too high", "frame resonance", "speed"]
                    recommendations:
                      - setting: "acceleration"
                        current_issue: "Too high for the motion system"
                        suggested_value: "1000mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Acceleration is the primary control for ghosting; reduce until ringing patterns disappear"
                      - setting: "jerk"
                        current_issue: "Too high"
                        suggested_value: "8mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower jerk smooths direction changes and reduces corner vibrations"
          PETG:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "PETG ghosting from print head vibrations"
                    likelihood: "medium"
                    contributing_factors: ["heavy direct drive head", "acceleration", "PETG shows ringing clearly on glossy surface"]
                    recommendations:
                      - setting: "acceleration"
                        current_issue: "Too high"
                        suggested_value: "800mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG's glossy surface makes ghosting more visible; lower acceleration is especially important"
                      - setting: "jerk"
                        current_issue: "Too high for smooth PETG surfaces"
                        suggested_value: "7mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower jerk values reduce the ringing that is highly visible on PETG's shiny surface"
                      - setting: "print_speed"
                        current_issue: "Too fast for quality PETG surfaces"
                        suggested_value: "40mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG benefits from slower speeds for both surface quality and reduced ghosting"
                      - setting: "outer_wall_speed"
                        current_issue: "Outer walls too fast"
                        suggested_value: "25mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Printing outer walls slowly while keeping infill fast gives the best balance of quality and speed"
              _default:
                causes:
                  - description: "PETG ghosting from vibrations visible on glossy surface"
                    likelihood: "medium"
                    contributing_factors: ["acceleration", "speed", "PETG surface reflectivity"]
                    recommendations:
                      - setting: "acceleration"
                        current_issue: "Too high"
                        suggested_value: "800mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reduce acceleration for better PETG surface quality"
                      - setting: "outer_wall_speed"
                        current_issue: "Outer walls too fast"
                        suggested_value: "25mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slow outer walls hide ghosting while maintaining print speed on internal structures"
          ABS:
            condition: "extruder_type"
            branches:
              _default:
                causes:
                  - description: "ABS ghosting from vibrations"
                    likelihood: "medium"
                    contributing_factors: ["acceleration", "speed", "frame rigidity"]
                    recommendations:
                      - setting: "acceleration"
                        current_issue: "Too high"
                        suggested_value: "800mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower acceleration reduces ringing on ABS surfaces"
                      - setting: "jerk"
                        current_issue: "Too high"
                        suggested_value: "8mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower jerk smooths direction changes"
                      - setting: "outer_wall_speed"
                        current_issue: "Outer walls too fast"
                        suggested_value: "30mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower outer walls improve ABS surface quality"
          _default:
            causes:
              - description: "Ghosting from vibrations in the motion system"
                likelihood: "high"
                contributing_factors: ["acceleration too high", "jerk too high", "frame resonance", "print speed"]
                recommendations:
                  - setting: "acceleration"
                    current_issue: "Too high causing vibrations at direction changes"
                    suggested_value: "1000mm/s2"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Reducing acceleration is the most effective single change for eliminating ghosting"
                  - setting: "jerk"
                    current_issue: "Too high allowing instantaneous speed changes that create vibrations"
                    suggested_value: "8mm/s"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Lower jerk smooths the speed profile at corners and reduces the impulse that drives ringing"
                  - setting: "outer_wall_speed"
                    current_issue: "Same speed as infill amplifying surface defects"
                    suggested_value: "25-30mm/s"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Printing outer walls slowly while keeping infill fast gives good surface quality without excessive print time"
                  - setting: "input_shaper"
                    current_issue: "Not enabled"
                    suggested_value: "Enable and calibrate for printer resonant frequency"
                    impact: "high"
                    difficulty: "hard"
                    category: "controllable"
                    explanation: "Input shaping eliminates ghosting at the firmware level by filtering out resonant frequencies"

    support_scarring:
      name: "Support Scarring"
      description: "Rough, damaged, or marked surfaces where support material contacted the print, caused by supports being too close, too dense, or using incorrect interface settings"
      root:
        condition: "material_type"
        branches:
          PLA:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "PLA support scarring from support interface too close to model surface"
                    likelihood: "high"
                    contributing_factors: ["support z-distance too small", "support interface density too high", "support pattern"]
                    recommendations:
                      - setting: "support_z_distance"
                        current_issue: "Support too close to model surface"
                        suggested_value: "0.2mm (one layer height)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Z-distance creates a gap between support and model; one layer height provides a breakable bond for PLA"
                      - setting: "support_interface_density"
                        current_issue: "Interface too dense making removal difficult"
                        suggested_value: "75%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reducing interface density from 100% to 75% makes supports easier to remove while still providing adequate surface support"
                      - setting: "support_interface_layers"
                        current_issue: "Too many or too few interface layers"
                        suggested_value: "3 layers"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "3 interface layers provide a smooth transition between sparse support body and the model surface"
                      - setting: "support_xy_distance"
                        current_issue: "Support too close to vertical walls"
                        suggested_value: "0.8mm"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Adequate XY distance prevents supports from bonding to vertical walls and leaving marks"
              _default:
                causes:
                  - description: "PLA support scarring from interface settings"
                    likelihood: "high"
                    contributing_factors: ["z-distance too small", "interface density too high"]
                    recommendations:
                      - setting: "support_z_distance"
                        current_issue: "Too small"
                        suggested_value: "0.2mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "One layer height of z-distance is the standard starting point for PLA support separation"
                      - setting: "support_interface_density"
                        current_issue: "Too dense"
                        suggested_value: "75%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reduced interface density improves support removal and reduces surface damage"
          PETG:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "PETG support scarring is severe due to strong interlayer bonding"
                    likelihood: "high"
                    contributing_factors: ["PETG bonds strongly to itself", "support z-distance too small", "interface too dense"]
                    recommendations:
                      - setting: "support_z_distance"
                        current_issue: "Too small for PETG's strong bonding"
                        suggested_value: "0.3mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
