metadata:
  type: decision_tree
  topic: layer_defect_diagnosis
  modes: [diagnose]
  version: "1.0"

data:
  description: "Decision trees for diagnosing layer-related print defects including layer shifting and layer separation (delamination)"
  trees:
    layer_shift:
      name: "Layer Shift"
      description: "Sudden horizontal displacement of layers mid-print, causing a visible offset in the X or Y axis. Typically caused by mechanical issues such as belt slip, motor skip, or collision."
      root:
        condition: "printer_family"
        branches:
          cartesian:
            condition: "material_type"
            branches:
              PLA:
                causes:
                  - description: "Mechanical layer shift from loose belts or excessive speed on cartesian printer"
                    likelihood: "high"
                    contributing_factors: ["loose X/Y belts", "print speed too high", "stepper motor overheating"]
                    recommendations:
                      - setting: "belt_tension"
                        current_issue: "X or Y belt loose causing tooth skip"
                        suggested_value: "Firm tension with ~1cm deflection at midpoint when pressed"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Loose belts allow the print head to skip teeth under acceleration, causing a permanent offset in the affected axis"
                      - setting: "print_speed"
                        current_issue: "Too fast for the motion system"
                        suggested_value: "50mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "High speeds generate more force during direction changes, increasing the chance of belt skip on cartesian printers"
                      - setting: "acceleration"
                        current_issue: "Too high causing stepper motor skip"
                        suggested_value: "1000mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "High acceleration requires more torque from stepper motors; reducing acceleration prevents motor stall and belt skip"
                      - setting: "stepper_current"
                        current_issue: "Motor driver current too low for the load"
                        suggested_value: "Increase by 10% if motors run cool; decrease if motors are hot to touch"
                        impact: "high"
                        difficulty: "hard"
                        category: "controllable"
                        explanation: "Insufficient stepper current causes the motor to skip steps under load; too much current causes overheating and thermal shutdown"
              ABS:
                causes:
                  - description: "Layer shift on cartesian from belt/speed issues compounded by ABS warping forces"
                    likelihood: "high"
                    contributing_factors: ["ABS warping lifting print into nozzle", "belt tension", "speed"]
                    recommendations:
                      - setting: "belt_tension"
                        current_issue: "Loose belts"
                        suggested_value: "Firm tension with ~1cm deflection at midpoint"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Belts must be properly tensioned to resist the forces from nozzle-print collisions caused by warped ABS"
                      - setting: "print_speed"
                        current_issue: "Too fast causing head collision with warped material"
                        suggested_value: "45mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower speed reduces impact force when the nozzle hits warped ABS corners"
                      - setting: "z_hop"
                        current_issue: "No z-hop allowing nozzle to catch on warped edges"
                        suggested_value: "0.4mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Z-hop lifts the nozzle during travel moves, clearing warped ABS edges that would otherwise catch and cause a shift"
                      - setting: "acceleration"
                        current_issue: "Too high for reliable motion"
                        suggested_value: "800mm/s2"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower acceleration reduces the chance of the stepper motor skipping when hitting warped material"
              PETG:
                causes:
                  - description: "Layer shift from PETG blobs catching the nozzle"
                    likelihood: "medium"
                    contributing_factors: ["PETG blob formation", "nozzle dragging through blobs", "belt tension"]
                    recommendations:
                      - setting: "z_hop"
                        current_issue: "No z-hop allowing nozzle to hit PETG blobs"
                        suggested_value: "0.3mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG commonly forms small blobs; z-hop clears these during travel to prevent collisions"
                      - setting: "belt_tension"
                        current_issue: "Loose belts"
                        suggested_value: "Firm tension with ~1cm deflection at midpoint"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Properly tensioned belts resist the force from nozzle-blob collisions"
                      - setting: "print_speed"
                        current_issue: "Too fast"
                        suggested_value: "45mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower speed reduces collision force and gives the motion system time to recover"
              _default:
                causes:
                  - description: "Cartesian layer shift from mechanical or speed issues"
                    likelihood: "high"
                    contributing_factors: ["belt tension", "speed", "acceleration"]
                    recommendations:
                      - setting: "belt_tension"
                        current_issue: "May be loose"
                        suggested_value: "Check and tighten X and Y belts"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Belt tension is the most common cause of layer shift on cartesian printers"
                      - setting: "print_speed"
                        current_issue: "May be too fast"
                        suggested_value: "50mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reducing speed lowers the forces on the motion system"
          corexy:
            condition: "material_type"
            branches:
              PLA:
                causes:
                  - description: "CoreXY layer shift from belt path issues or motor skip"
                    likelihood: "medium"
                    contributing_factors: ["uneven belt tension between A/B motors", "grub screw loose on pulley", "high speed/acceleration"]
                    recommendations:
                      - setting: "belt_tension"
                        current_issue: "Uneven A/B belt tension"
                        suggested_value: "Match tension on both belts; ~1cm deflection at midpoint"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "CoreXY uses two belts (A and B) that must be equally tensioned; unequal tension causes diagonal shifts"
                      - setting: "acceleration"
                        current_issue: "Too high for the CoreXY kinematics"
                        suggested_value: "2000mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "CoreXY printers can handle higher acceleration than cartesian, but exceeding the limit still causes motor skip"
                      - setting: "pulley_grub_screws"
                        current_issue: "Motor pulley grub screw loose"
                        suggested_value: "Tighten with threadlocker on flat of motor shaft"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "A loose grub screw on a motor pulley allows the belt to slip intermittently, causing random layer shifts"
                      - setting: "print_speed"
                        current_issue: "Exceeding motion system capability"
                        suggested_value: "80mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "CoreXY handles higher speeds but each machine has a limit based on frame rigidity and motor torque"
              ABS:
                causes:
                  - description: "CoreXY layer shift from warped ABS collision or thermal stepper issues"
                    likelihood: "medium"
                    contributing_factors: ["ABS warp catching nozzle", "stepper overheating in enclosure"]
                    recommendations:
                      - setting: "stepper_current"
                        current_issue: "Stepper motors overheating in enclosed environment"
                        suggested_value: "Verify motors are not exceeding 60C; reduce current by 10% if hot"
                        impact: "high"
                        difficulty: "hard"
                        category: "controllable"
                        explanation: "In an enclosure, stepper motors run hotter and may thermally throttle, losing steps"
                      - setting: "z_hop"
                        current_issue: "No z-hop to clear warped ABS"
                        suggested_value: "0.4mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Z-hop prevents the nozzle from catching on warped ABS corners during travel"
                      - setting: "acceleration"
                        current_issue: "Too high in warm enclosure"
                        suggested_value: "1500mm/s2"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reduce acceleration when printing in an enclosure to compensate for reduced motor torque at elevated temperatures"
              _default:
                causes:
                  - description: "CoreXY layer shift from belt or motor issues"
                    likelihood: "medium"
                    contributing_factors: ["belt tension mismatch", "grub screw", "acceleration"]
                    recommendations:
                      - setting: "belt_tension"
                        current_issue: "A and B belts may not be equally tensioned"
                        suggested_value: "Equalize tension on both CoreXY belts"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Unequal belt tension is the primary cause of layer shift on CoreXY printers"
                      - setting: "acceleration"
                        current_issue: "May exceed machine capability"
                        suggested_value: "2000mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Start with moderate acceleration and increase gradually to find the limit"
          delta:
            condition: "material_type"
            branches:
              _default:
                causes:
                  - description: "Delta layer shift from loose arm joints, belt issues, or calibration drift"
                    likelihood: "medium"
                    contributing_factors: ["loose delta arm ball joints", "belt tension", "endstop calibration drift"]
                    recommendations:
                      - setting: "delta_arm_joints"
                        current_issue: "Ball joints worn or loose"
                        suggested_value: "Check all 6 arm joints for play; replace if worn"
                        impact: "high"
                        difficulty: "hard"
                        category: "controllable"
                        explanation: "Worn ball joints on delta arms cause inconsistent positioning that manifests as layer shifts, especially at high speeds"
                      - setting: "acceleration"
                        current_issue: "Too high for delta kinematics"
                        suggested_value: "1500mm/s2"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Delta printers amplify motion errors at the edges of the build volume; lower acceleration improves accuracy"
                      - setting: "delta_calibration"
                        current_issue: "Endstop calibration may have drifted"
                        suggested_value: "Re-run delta calibration routine"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "Delta printers require precise endstop calibration; small drift causes positioning errors that look like layer shifts"
                      - setting: "print_speed"
                        current_issue: "Too fast for reliable delta positioning"
                        suggested_value: "50mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Delta printers lose accuracy at high speeds due to the complex kinematics"
          _default:
            causes:
              - description: "Layer shift from mechanical or speed issues"
                likelihood: "high"
                contributing_factors: ["belt tension", "acceleration too high", "motor current", "collision"]
                recommendations:
                  - setting: "belt_tension"
                    current_issue: "Belts may be loose"
                    suggested_value: "Check and tighten all belts"
                    impact: "high"
                    difficulty: "moderate"
                    category: "controllable"
                    explanation: "Belt tension is the most common cause of layer shifts across all printer types"
                  - setting: "acceleration"
                    current_issue: "May be too high for the motion system"
                    suggested_value: "1000mm/s2"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Reducing acceleration lowers the forces on the motion system and prevents motor skip"
                  - setting: "print_speed"
                    current_issue: "May be exceeding safe limits"
                    suggested_value: "50mm/s"
                    impact: "medium"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Lower speed is a safe starting point while diagnosing layer shift causes"

    layer_separation:
      name: "Layer Separation / Delamination"
      description: "Visible gaps between layers or layers that split apart, caused by insufficient interlayer adhesion from temperature, cooling, or contamination issues"
      root:
        condition: "printer_family"
        branches:
          cartesian:
            condition: "material_type"
            branches:
              PLA:
                causes:
                  - description: "PLA layer separation from over-cooling or under-temperature"
                    likelihood: "high"
                    contributing_factors: ["nozzle temperature too low", "part cooling fan too high", "drafts"]
                    recommendations:
                      - setting: "nozzle_temperature"
                        current_issue: "Too low for proper PLA interlayer bonding"
                        suggested_value: "215C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Higher nozzle temperature ensures each layer is hot enough to thermally bond with the layer below"
                      - setting: "part_cooling_fan"
                        current_issue: "100% fan cooling layers too fast for bonding"
                        suggested_value: "80%"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slightly reduced fan speed gives each layer more time to bond before cooling and solidifying"
                      - setting: "print_speed"
                        current_issue: "Too fast reducing heat transfer time between layers"
                        suggested_value: "45mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower printing allows more heat transfer from the nozzle to the previous layer, improving bonding"
                      - setting: "layer_height"
                        current_issue: "Too tall for nozzle diameter"
                        suggested_value: "0.2mm (for 0.4mm nozzle)"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Layer height should not exceed 75% of nozzle diameter; taller layers have less contact area for bonding"
              PETG:
                causes:
                  - description: "PETG layer separation from insufficient temperature or excessive cooling"
                    likelihood: "medium"
                    contributing_factors: ["temperature too low", "fan speed too high", "layer height too tall"]
                    recommendations:
                      - setting: "nozzle_temperature"
                        current_issue: "Too low for PETG interlayer bonding"
                        suggested_value: "240C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG needs higher temperatures for strong interlayer bonds; 240C ensures full melting and bonding"
                      - setting: "part_cooling_fan"
                        current_issue: "Fan speed too high for PETG"
                        suggested_value: "40%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG bonds poorly with aggressive cooling; reduce fan to allow thermal bonding"
                      - setting: "print_speed"
                        current_issue: "Too fast for thermal bonding"
                        suggested_value: "40mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower speed increases the time the hot extrudate contacts the previous layer"
              ABS:
                causes:
                  - description: "ABS layer separation from drafts, insufficient temperature, or no enclosure"
                    likelihood: "high"
                    contributing_factors: ["no enclosure", "ambient cooling", "temperature too low", "any part cooling fan"]
                    recommendations:
                      - setting: "enclosure"
                        current_issue: "No enclosure causing rapid cooling between layers"
                        suggested_value: "Enclosed environment with 45-55C chamber"
                        impact: "high"
                        difficulty: "hard"
                        category: "environmental"
                        explanation: "ABS requires a warm ambient temperature to maintain interlayer bonding; cold air between layers causes splitting"
                      - setting: "nozzle_temperature"
                        current_issue: "Too low for ABS bonding"
                        suggested_value: "250C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Higher nozzle temperature ensures each ABS layer remelts the surface of the previous layer for strong bonding"
                      - setting: "part_cooling_fan"
                        current_issue: "Fan on during ABS print"
                        suggested_value: "0%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Any part cooling fan causes ABS layers to cool too fast, preventing interlayer fusion"
                      - setting: "print_speed"
                        current_issue: "Too fast for interlayer bonding"
                        suggested_value: "40mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower speed allows more heat to transfer into the previous layer"
              TPU:
                causes:
                  - description: "TPU layer separation (uncommon due to flexible bonding)"
                    likelihood: "low"
                    contributing_factors: ["temperature too low", "print speed too fast"]
                    recommendations:
                      - setting: "nozzle_temperature"
                        current_issue: "Too low for TPU bonding"
                        suggested_value: "235C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Higher TPU temperature improves interlayer fusion; TPU is forgiving but still needs adequate heat"
                      - setting: "print_speed"
                        current_issue: "Too fast for TPU"
                        suggested_value: "25mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slow speed ensures proper layer bonding for flexible materials"
              ASA:
                causes:
                  - description: "ASA layer separation from insufficient temperature or cooling issues"
                    likelihood: "high"
                    contributing_factors: ["no enclosure", "temperature too low", "fan on"]
                    recommendations:
                      - setting: "enclosure"
                        current_issue: "No enclosure causing rapid interlayer cooling"
                        suggested_value: "Enclosed environment with 45-55C chamber"
                        impact: "high"
                        difficulty: "hard"
                        category: "environmental"
                        explanation: "ASA requires an enclosure to prevent rapid cooling between layers that causes delamination"
                      - setting: "nozzle_temperature"
                        current_issue: "Too low for ASA interlayer bonding"
                        suggested_value: "255C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Higher temperature improves thermal bonding between ASA layers"
                      - setting: "part_cooling_fan"
                        current_issue: "Fan on during ASA print"
                        suggested_value: "0-15%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Minimal or no fan is required for ASA interlayer adhesion"
              _default:
                causes:
                  - description: "Layer separation on cartesian from thermal bonding issues"
                    likelihood: "high"
                    contributing_factors: ["temperature", "cooling", "layer height"]
                    recommendations:
                      - setting: "nozzle_temperature"
                        current_issue: "May be too low for interlayer bonding"
                        suggested_value: "Increase by 5-10C from current setting"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Higher nozzle temperature is the primary fix for layer separation"
                      - setting: "part_cooling_fan"
                        current_issue: "May be too aggressive"
                        suggested_value: "Reduce by 20% from current setting"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Less cooling gives layers more time to bond"
          corexy:
            condition: "material_type"
            branches:
              ABS:
                causes:
                  - description: "ABS layer separation on CoreXY from enclosure and temperature issues"
                    likelihood: "medium"
                    contributing_factors: ["enclosure not sealed", "temperature too low", "fast printing cooling layers"]
                    recommendations:
                      - setting: "enclosure_temperature"
                        current_issue: "Chamber not maintaining adequate temperature"
                        suggested_value: "50-60C chamber"
                        impact: "high"
                        difficulty: "moderate"
                        category: "environmental"
                        explanation: "CoreXY printers are often enclosed; ensure the enclosure is sealed and maintaining temperature"
                      - setting: "nozzle_temperature"
                        current_issue: "Too low for ABS bonding at high speeds"
                        suggested_value: "250C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "CoreXY printers often print faster; ABS needs higher temperature to compensate for reduced heating time per layer"
                      - setting: "print_speed"
                        current_issue: "High CoreXY speed causing insufficient layer bonding time"
                        suggested_value: "50mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reducing speed gives each layer more time to bond before the next layer is deposited"
              _default:
                causes:
                  - description: "Layer separation on CoreXY from speed and temperature balance"
                    likelihood: "medium"
                    contributing_factors: ["high speed reducing bonding time", "temperature"]
                    recommendations:
                      - setting: "nozzle_temperature"
                        current_issue: "May be too low for the print speed"
                        suggested_value: "Increase by 5-10C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Faster printing requires higher temperatures to maintain interlayer bonding"
                      - setting: "print_speed"
                        current_issue: "May be too fast for proper bonding"
                        suggested_value: "Reduce by 20% from current speed"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slower printing allows more thermal energy transfer between layers"
          _default:
            causes:
              - description: "Layer separation from insufficient thermal bonding"
                likelihood: "high"
                contributing_factors: ["nozzle temperature too low", "part cooling too aggressive", "drafts", "layer height too tall"]
                recommendations:
                  - setting: "nozzle_temperature"
                    current_issue: "Too low for strong interlayer bonds"
                    suggested_value: "Increase by 5-10C within the material safe range"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Higher nozzle temperature is the most effective fix for layer separation across all materials"
                  - setting: "part_cooling_fan"
                    current_issue: "Too aggressive for the material"
                    suggested_value: "Reduce by 20%; use 0% for ABS/ASA"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Excessive cooling prevents layers from thermally fusing; each material has an optimal cooling level"
                  - setting: "layer_height"
                    current_issue: "May be too tall for nozzle diameter"
                    suggested_value: "0.2mm (for 0.4mm nozzle); max 75% of nozzle diameter"
                    impact: "medium"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Thinner layers have more surface contact area and receive more heat from the nozzle, improving bonding"
                  - setting: "print_speed"
                    current_issue: "Too fast for thermal bonding"
                    suggested_value: "40mm/s"
                    impact: "medium"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Slower speed increases the dwell time of hot extrudate on the previous layer"
