metadata:
  type: decision_tree
  topic: bridging_defect_diagnosis
  modes: [diagnose]
  version: "1.0"

data:
  description: "Decision tree for diagnosing poor bridging performance where unsupported horizontal spans sag or fail"
  trees:
    poor_bridging:
      name: "Poor Bridging"
      description: "Filament sags, droops, or fails completely when printing unsupported horizontal spans between two anchor points. Caused by incorrect bridge speed, cooling, temperature, or excessive span length."
      root:
        condition: "material_type"
        branches:
          PLA:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "PLA bridge sagging from speed, cooling, or temperature issues"
                    likelihood: "high"
                    contributing_factors: ["bridge speed too slow", "insufficient cooling", "temperature too high", "bridge flow too high"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Too slow allowing filament to sag before solidifying"
                        suggested_value: "25mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bridge speed must be fast enough to stretch the filament taut between anchor points before it sags, but not so fast it breaks the strand"
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan not at maximum for bridging"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Maximum cooling solidifies PLA bridge strands as quickly as possible, preventing sag under their own weight"
                      - setting: "bridge_flow"
                        current_issue: "Too high depositing heavy strands that sag"
                        suggested_value: "90%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slightly reduced flow creates thinner, lighter bridge strands that are easier to keep taut and cool faster"
                      - setting: "nozzle_temperature"
                        current_issue: "Too high making filament too fluid for bridging"
                        suggested_value: "195C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower temperature increases PLA viscosity, helping strands hold their shape during the unsupported span"
                      - setting: "bridge_wall_count"
                        current_issue: "Only one bridge wall providing weak foundation"
                        suggested_value: "2"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Multiple bridge walls create stronger anchor points at each end of the bridge span"
              bowden:
                causes:
                  - description: "PLA bridge sagging with delayed flow control from bowden"
                    likelihood: "high"
                    contributing_factors: ["bowden pressure delay", "bridge flow control lag", "cooling"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Speed not tuned for bowden bridge flow dynamics"
                        suggested_value: "30mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slightly higher bridge speed for bowden compensates for the delayed flow response; the filament stretches taut before excess material arrives"
                      - setting: "bridge_fan_speed"
                        current_issue: "Not at maximum"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Maximum fan speed is critical for PLA bridging to solidify strands before gravity pulls them down"
                      - setting: "bridge_flow"
                        current_issue: "Too high for bowden system"
                        suggested_value: "85%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bowden systems may over-extrude on bridges due to pressure buildup; lower flow compensates"
                      - setting: "nozzle_temperature"
                        current_issue: "Too high for bridge strands"
                        suggested_value: "195C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower temperature creates stiffer strands that bridge better"
              _default:
                causes:
                  - description: "PLA bridge performance issues"
                    likelihood: "high"
                    contributing_factors: ["speed", "cooling", "flow", "temperature"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Not optimized for bridging"
                        suggested_value: "25mm/s (direct drive) or 30mm/s (bowden)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bridge speed must balance stretching the filament taut against breaking the strand"
                      - setting: "bridge_fan_speed"
                        current_issue: "Not at maximum"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Maximum cooling is essential for PLA bridging"
          PETG:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "PETG bridge sagging from high temperature and low viscosity"
                    likelihood: "high"
                    contributing_factors: ["PETG stays molten longer", "low viscosity at print temp", "insufficient cooling"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Too slow for PETG bridging"
                        suggested_value: "20mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG needs slower bridge speed than PLA because it stays fluid longer; too fast breaks the strand, too slow lets it droop"
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan too low for bridge cooling"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Even though PETG normally uses reduced fan, bridging is the exception; maximum cooling is needed to solidify bridge strands"
                      - setting: "bridge_flow"
                        current_issue: "Flow too high creating heavy strands"
                        suggested_value: "85%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG's low viscosity means thinner strands are easier to keep taut; reduce flow more than for PLA"
                      - setting: "nozzle_temperature"
                        current_issue: "Too high for bridge span"
                        suggested_value: "225C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower PETG temperature increases melt viscosity, helping bridge strands maintain shape during the span"
                      - setting: "bridge_wall_count"
                        current_issue: "Not enough bridge walls"
                        suggested_value: "3"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG benefits from extra bridge walls to create stronger anchor points since the material is stretchier"
              bowden:
                causes:
                  - description: "PETG bridge performance severely impacted by bowden pressure delay"
                    likelihood: "high"
                    contributing_factors: ["bowden pressure hysteresis", "PETG low viscosity", "delayed flow control"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Not tuned for bowden PETG bridging"
                        suggested_value: "22mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG on bowden needs careful speed tuning; moderate speed stretches strands while compensating for delayed flow changes"
                      - setting: "bridge_fan_speed"
                        current_issue: "Not at maximum for bridges"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Maximum fan is essential for PETG bridges regardless of extruder type"
                      - setting: "bridge_flow"
                        current_issue: "Too high for bowden PETG"
                        suggested_value: "80%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bowden PETG over-extrudes on bridges due to stored pressure; aggressive flow reduction is needed"
                      - setting: "nozzle_temperature"
                        current_issue: "Too high increasing sag"
                        suggested_value: "225C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower temperature stiffens PETG strands for better bridging performance"
              _default:
                causes:
                  - description: "PETG poor bridging from material properties"
                    likelihood: "high"
                    contributing_factors: ["low viscosity", "high temperature", "stays fluid longer"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Not optimized for PETG"
                        suggested_value: "20mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG bridges best at slower speeds than PLA due to its stretchier nature"
                      - setting: "bridge_fan_speed"
                        current_issue: "Not at maximum for bridging"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Bridge cooling must be maximized even for materials that normally use reduced fan"
          ABS:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "ABS bridge sagging from high temperature and lack of cooling"
                    likelihood: "high"
                    contributing_factors: ["no part cooling fan normally", "high nozzle temperature", "enclosed environment"]
                    recommendations:
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan off during ABS print including bridges"
                        suggested_value: "50%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "ABS bridges are an exception to the no-fan rule; moderate fan during bridge spans helps solidify strands without causing layer adhesion problems"
                      - setting: "bridge_speed"
                        current_issue: "Not optimized for ABS bridging"
                        suggested_value: "20mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slow bridge speed allows ABS strands to stretch taut before gravity pulls them; ABS has better melt strength than PETG"
                      - setting: "bridge_flow"
                        current_issue: "Too high creating heavy strands"
                        suggested_value: "90%"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slightly reduced flow creates lighter ABS strands that resist sagging"
                      - setting: "nozzle_temperature"
                        current_issue: "Higher than needed for bridge sections"
                        suggested_value: "240C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower ABS temperature for bridges increases melt strength and strand stiffness"
                      - setting: "bridge_wall_count"
                        current_issue: "Too few bridge walls"
                        suggested_value: "2"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Additional bridge walls provide stronger anchor points for ABS bridge strands"
              _default:
                causes:
                  - description: "ABS poor bridging from high temperature and limited cooling"
                    likelihood: "high"
                    contributing_factors: ["high temperature", "normally no fan", "enclosed heat"]
                    recommendations:
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan off even for bridges"
                        suggested_value: "50%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Enable moderate fan for ABS bridge sections only; this is the exception to the no-fan rule"
                      - setting: "bridge_speed"
                        current_issue: "Not tuned for ABS"
                        suggested_value: "20mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "ABS bridges best at slow, controlled speed"
          TPU:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "TPU bridging is inherently poor due to material flexibility and elasticity"
                    likelihood: "high"
                    contributing_factors: ["material elasticity", "strands stretch instead of holding shape", "slow solidification"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Speed not tuned for TPU bridging"
                        suggested_value: "15mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Very slow bridging gives TPU strands time to cool while being deposited; too fast stretches the elastic material to breaking"
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan not maximized for bridges"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Maximum cooling is essential to solidify TPU bridge strands before they droop"
                      - setting: "bridge_flow"
                        current_issue: "Flow not tuned for TPU bridges"
                        suggested_value: "100%"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Unlike rigid materials, TPU benefits from full flow on bridges to create thicker strands that sag less due to higher stiffness"
                      - setting: "nozzle_temperature"
                        current_issue: "Too high for bridge span"
                        suggested_value: "225C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower temperature makes TPU stiffer and less prone to drooping during bridge spans"
                      - setting: "maximum_bridge_length"
                        current_issue: "Bridge span may be too long for TPU"
                        suggested_value: "Redesign to keep bridges under 20mm or add supports"
                        impact: "high"
                        difficulty: "hard"
                        category: "controllable"
                        explanation: "TPU cannot reliably bridge long spans; designs should minimize unsupported distances or use supports"
              bowden:
                causes:
                  - description: "TPU bridging on bowden is extremely difficult"
                    likelihood: "high"
                    contributing_factors: ["material elasticity", "bowden compression", "no reliable flow control for bridges"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Cannot reliably control TPU bridge flow on bowden"
                        suggested_value: "10mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Very slow speed is the only option for TPU bridges on bowden; flow control is too unpredictable for faster speeds"
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan not maximized"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Maximum cooling helps whatever strands are deposited solidify quickly"
                      - setting: "supports"
                        current_issue: "Relying on bridging instead of supports"
                        suggested_value: "Use supports for all overhangs with TPU on bowden"
                        impact: "high"
                        difficulty: "moderate"
                        category: "controllable"
                        explanation: "TPU on bowden cannot reliably bridge; supports are necessary for any unsupported horizontal span"
              _default:
                causes:
                  - description: "TPU poor bridging from inherent material flexibility"
                    likelihood: "high"
                    contributing_factors: ["elasticity", "droop", "slow solidification"]
                    recommendations:
                      - setting: "bridge_speed"
                        current_issue: "Not tuned for TPU"
                        suggested_value: "15mm/s (direct drive) or 10mm/s (bowden)"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "TPU bridges require very slow speeds and maximum cooling"
                      - setting: "bridge_fan_speed"
                        current_issue: "Not at maximum"
                        suggested_value: "100%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Maximum cooling is critical for TPU bridging"
          ASA:
            condition: "extruder_type"
            branches:
              direct_drive:
                causes:
                  - description: "ASA bridge sagging similar to ABS with limited cooling available"
                    likelihood: "high"
                    contributing_factors: ["high temperature", "limited cooling", "enclosed environment"]
                    recommendations:
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan off during ASA print including bridges"
                        suggested_value: "40%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "ASA bridges benefit from moderate fan speed; lower than ABS due to ASA's slightly higher sensitivity to thermal shock"
                      - setting: "bridge_speed"
                        current_issue: "Not optimized for ASA bridges"
                        suggested_value: "18mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "ASA bridges best at controlled slow speed to stretch strands taut while maintaining adhesion at anchor points"
                      - setting: "bridge_flow"
                        current_issue: "Too high"
                        suggested_value: "88%"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reduced flow creates lighter ASA bridge strands that resist sagging"
                      - setting: "nozzle_temperature"
                        current_issue: "Too high for bridge sections"
                        suggested_value: "245C"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower end of ASA range provides stiffer strands for better bridging"
              _default:
                causes:
                  - description: "ASA poor bridging from high temperature and limited cooling"
                    likelihood: "high"
                    contributing_factors: ["high temperature", "normally low fan speed"]
                    recommendations:
                      - setting: "bridge_fan_speed"
                        current_issue: "Fan off even for bridges"
                        suggested_value: "40%"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Moderate fan for ASA bridge sections only"
                      - setting: "bridge_speed"
                        current_issue: "Not optimized"
                        suggested_value: "18mm/s"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "ASA bridges best at slow, controlled speed"
          _default:
            causes:
              - description: "Poor bridging from speed, cooling, flow, or temperature issues"
                likelihood: "high"
                contributing_factors: ["bridge speed not optimized", "insufficient cooling", "flow too high", "temperature too high"]
                recommendations:
                  - setting: "bridge_speed"
                    current_issue: "Not tuned for bridging"
                    suggested_value: "20-30mm/s depending on material"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Bridge speed must balance stretching filament taut against breaking it; start at 25mm/s and tune with a bridge test print"
                  - setting: "bridge_fan_speed"
                    current_issue: "Not maximized for bridge sections"
                    suggested_value: "100% (PLA/PETG/TPU) or 50% (ABS/ASA)"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Maximum cooling solidifies bridge strands before gravity pulls them down; ABS/ASA use moderate fan to avoid thermal shock"
                  - setting: "bridge_flow"
                    current_issue: "Too high creating heavy strands that sag"
                    suggested_value: "85-95% depending on material"
                    impact: "high"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Reduced flow creates thinner, lighter strands that cool faster and resist sagging"
                  - setting: "nozzle_temperature"
                    current_issue: "Higher than needed for bridges"
                    suggested_value: "Reduce by 5-10C from normal print temperature"
                    impact: "medium"
                    difficulty: "easy"
                    category: "controllable"
                    explanation: "Lower temperature increases melt viscosity and strand stiffness, improving bridge performance"
