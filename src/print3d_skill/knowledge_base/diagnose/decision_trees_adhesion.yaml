    elephant_foot:
      name: "Elephant Foot"
      description: "The first few layers bulge outward wider than the rest of the print, caused by the weight of the model compressing the soft first layers against the heated bed"
      root:
        condition: "material_type"
        branches:
          PLA:
            condition: "enclosure_type"
            branches:
              open:
                causes:
                  - description: "PLA elephant foot from bed temperature too high or z-offset too low"
                    likelihood: "high"
                    contributing_factors: ["bed temperature softening first layers", "nozzle too close squishing material", "first layer flow too high"]
                    recommendations:
                      - setting: "bed_temperature"
                        current_issue: "Too high causing first layers to remain soft"
                        suggested_value: "55C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower bed temperature allows PLA first layers to solidify faster and resist compression from upper layers"
                      - setting: "z_offset"
                        current_issue: "Nozzle too close to bed"
                        suggested_value: "Increase by +0.02-0.05mm from current"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Too-close nozzle over-squishes the first layer, forcing material outward"
                      - setting: "first_layer_flow"
                        current_issue: "First layer flow too high"
                        suggested_value: "95%"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Reducing first layer flow prevents excess material from being forced outward"
                      - setting: "elephant_foot_compensation"
                        current_issue: "Slicer compensation not enabled"
                        suggested_value: "0.2mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Most slicers have an elephant foot compensation setting that insets the first layer perimeter to offset the bulge"
              _default:
                causes:
                  - description: "PLA elephant foot from bed temperature and first layer settings"
                    likelihood: "high"
                    contributing_factors: ["bed too hot", "nozzle too close", "first layer flow"]
                    recommendations:
                      - setting: "bed_temperature"
                        current_issue: "Too high for dimensional accuracy"
                        suggested_value: "55C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower bed temp is the primary fix for PLA elephant foot"
                      - setting: "elephant_foot_compensation"
                        current_issue: "Not enabled"
                        suggested_value: "0.2mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Slicer-level compensation insets the first layer to offset the bulge"
          PETG:
            condition: "enclosure_type"
            branches:
              open:
                causes:
                  - description: "PETG elephant foot from high bed temperature and low viscosity"
                    likelihood: "high"
                    contributing_factors: ["high bed temperature", "PETG stays soft longer", "nozzle too close"]
                    recommendations:
