                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Lower bed temp reduces PETG elephant foot while maintaining adhesion"
                      - setting: "elephant_foot_compensation"
                        current_issue: "Not configured"
                        suggested_value: "0.25mm"
                        impact: "high"
                        difficulty: "easy"
