                        current_issue: "Too high causing prolonged softness in first layers"
                        suggested_value: "75C"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG remains soft at higher temperatures; reducing bed temp helps first layers solidify before upper layers add weight"
                      - setting: "z_offset"
                        current_issue: "Nozzle too close for PETG"
                        suggested_value: "Increase by +0.03mm from current"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG spreads more than PLA; a slightly higher z-offset reduces squish"
                      - setting: "elephant_foot_compensation"
                        current_issue: "Not enabled"
                        suggested_value: "0.25mm"
                        impact: "high"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "PETG may need slightly more compensation than PLA due to its tendency to spread"
                      - setting: "first_layer_speed"
                        current_issue: "First layer too slow allowing heat to build up"
                        suggested_value: "20mm/s"
                        impact: "medium"
                        difficulty: "easy"
                        category: "controllable"
                        explanation: "Moderately fast first layer reduces heat accumulation from the nozzle dwelling over the same area"
              _default:
