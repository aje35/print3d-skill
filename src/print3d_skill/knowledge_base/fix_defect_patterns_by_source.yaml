metadata:
  type: lookup_table
  topic: Defect Patterns by Source Type
  modes: [fix]
  materials: []
  printers: []
  version: "1.0"

data:
  description: "Common mesh defect patterns grouped by the origin of the mesh file"
  sources:
    - name: thingiverse
      description: "Community-uploaded models from Thingiverse and similar repositories. Quality varies widely depending on the original author's modeling skills."
      common_defects:
        - defect_type: duplicate_vertices
          frequency: high
          notes: "Many uploads have unmerged vertices from repeated boolean operations or sloppy mesh editing"
        - defect_type: non_manifold_edges
          frequency: high
          notes: "Interior faces left behind from boolean operations that were not cleaned up"
        - defect_type: inconsistent_normals
          frequency: medium
          notes: "Mixed winding order from combining meshes exported by different tools"
      recommended_repair_order:
        - "Merge duplicate vertices within tolerance"
        - "Remove non-manifold edges and degenerate faces"
        - "Fix normals to consistent outward orientation"
        - "Fill any remaining holes"

    - name: ai_generated
      description: "Meshes generated by AI tools (e.g., text-to-3D, image-to-3D). Typically produce visually plausible but geometrically problematic meshes."
      common_defects:
        - defect_type: high_poly_count
          frequency: high
          notes: "AI models often output extremely dense meshes (100k+ faces) that are impractical for slicing"
        - defect_type: self_intersecting
          frequency: high
          notes: "Generated geometry frequently has overlapping and interpenetrating surfaces"
        - defect_type: non_watertight
          frequency: high
          notes: "AI meshes are often open surfaces rather than closed solids"
      recommended_repair_order:
        - "Decimate to reduce poly count while preserving shape"
        - "Separate into shells and perform boolean union to resolve intersections"
        - "Fill holes to make watertight"
        - "Fix normals and validate manifold status"

    - name: 3d_scan
      description: "Meshes captured via 3D scanning (photogrammetry, structured light, LiDAR). Contain artifacts from the scanning process."
      common_defects:
        - defect_type: holes
          frequency: high
          notes: "Occluded or unreachable areas produce gaps in the scan data"
        - defect_type: noise_degenerate_faces
          frequency: high
          notes: "Scanner noise creates tiny, degenerate triangles and spikes on the surface"
        - defect_type: duplicate_vertices
          frequency: medium
          notes: "Overlapping scan passes can produce duplicate or near-duplicate vertices"
      recommended_repair_order:
        - "Remove degenerate and zero-area faces"
        - "Merge duplicate vertices"
        - "Smooth surface to reduce noise artifacts"
        - "Fill holes from occluded regions"
        - "Decimate if poly count is too high for slicing"

    - name: cad_export
      description: "Meshes exported from CAD software (Fusion 360, SolidWorks, FreeCAD). Generally high quality but can have tessellation artifacts."
      common_defects:
        - defect_type: non_manifold_edges
          frequency: medium
          notes: "Boolean operations in CAD can leave non-manifold edges at intersection boundaries"
        - defect_type: tiny_gaps
          frequency: medium
          notes: "Small gaps between mating surfaces from tessellation tolerance mismatches"
      recommended_repair_order:
        - "Merge vertices with a tight tolerance to close tiny gaps"
        - "Remove non-manifold edges from boolean boundaries"
        - "Fill any small holes created by gap closure"
        - "Validate watertightness"

    - name: terrain_model
      description: "Terrain and topographic meshes generated from elevation data (GIS, heightmaps). Designed for visualization, not 3D printing."
      common_defects:
        - defect_type: very_high_poly
          frequency: high
          notes: "Terrain data can produce millions of faces from high-resolution elevation grids"
        - defect_type: non_watertight
          frequency: high
          notes: "Terrain surfaces are typically open on the bottom and sides"
        - defect_type: thin_walls
          frequency: medium
          notes: "Valleys and ridges can produce walls thinner than minimum printable thickness"
      recommended_repair_order:
        - "Decimate to a printable poly count"
        - "Add a base plate and side walls to close the mesh"
        - "Fill remaining holes to make watertight"
        - "Check for thin walls and thicken if needed"
        - "Fix normals to consistent outward orientation"
